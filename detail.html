<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehicle Detail — ExportLots</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
  <div class="nav-logo">Export<span>Lots</span></div>
  <div class="nav-links">
    <a href="index.html">Catalog</a>
    <a href="shipping.html">Shipping</a>
    <a href="how-it-works.html">How it works</a>
    <a href="wholesale.html">Wholesale</a>
  </div>
  <a class="nav-wa" href="https://wa.me/12127966646" target="_blank">
    <i class="ti ti-brand-whatsapp"></i> WhatsApp
  </a>
</nav>

<div class="detail-wrap">
  <div style="margin-bottom:12px">
    <a href="index.html" style="font-size:13px;color:var(--text2);display:flex;align-items:center;gap:5px">
      <i class="ti ti-arrow-left"></i> Back to catalog
    </a>
  </div>
  <div class="detail-card" id="detail-card">
    <div style="padding:40px;text-align:center;color:var(--text2)">Loading...</div>
  </div>
</div>

<a style="position:fixed;bottom:20px;right:20px;z-index:999;display:flex;align-items:center;gap:7px;background:#25D366;color:#fff;font-size:14px;font-weight:500;padding:12px 20px;border-radius:50px;box-shadow:0 4px 18px rgba(37,211,102,0.3);text-decoration:none" href="https://wa.me/12127966646" target="_blank">
  <i class="ti ti-brand-whatsapp" style="font-size:20px"></i> WhatsApp
</a>

<script src="rates.js"></script>
<script src="vehicles.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const vin = params.get('vin');
const v = VEHICLES.find(x => x.vin === vin);

function getStatus(v) {
  if (!v.active) return 'sold';
  if (v.auctionType === 'buynow') return 'available';
  if (!v.auctionDate) return 'available';
  return new Date(v.auctionDate) > new Date() ? 'auction' : 'sold';
}

const STATUS_COLORS = { damage:'#E24B4A', repair:'#EF9F27', clean:'#3B6D11', unknown:'#888' };

function damagePoint(x, y, status) {
  const c = STATUS_COLORS[status] || '#888';
  return `<circle cx="${x}" cy="${y}" r="5" fill="${c}" opacity="0.9"/>`;
}

const ZONE_COORDS = {
  windshield:    {x:162, y:55},
  frontBumper:   {x:178, y:55},
  hood:          {x:153, y:46},
  leftFrontDoor: {x:95,  y:22},
  leftFender:    {x:133, y:22},
  leftRearDoor:  {x:72,  y:22},
  rightFrontDoor:{x:95,  y:88},
  rightRearDoor: {x:72,  y:88},
  rightFender:   {x:133, y:88},
  rearBumper:    {x:22,  y:55},
  roof:          {x:110, y:55},
  rearGlass:     {x:40,  y:55},
};

function buildDiagram(damage) {
  const points = damage.map(d => {
    const c = ZONE_COORDS[d.zone];
    if (!c) return '';
    return damagePoint(c.x, c.y, d.status);
  }).join('');

  return `<svg viewBox="0 0 200 110" width="100%" xmlns="http://www.w3.org/2000/svg">
    <rect x="18" y="28" width="164" height="54" rx="10" fill="none" stroke="#ccc" stroke-width="1.2"/>
    <rect x="140" y="30" width="38" height="50" rx="8" fill="#f0efe9" stroke="#ddd" stroke-width="0.8"/>
    <rect x="22" y="30" width="32" height="50" rx="8" fill="#f0efe9" stroke="#ddd" stroke-width="0.8"/>
    <rect x="62" y="32" width="72" height="46" rx="4" fill="#f0efe9" stroke="#ddd" stroke-width="0.8"/>
    <ellipse cx="152" cy="26" rx="7" ry="5" fill="#e8e7e1" stroke="#ccc" stroke-width="0.8"/>
    <ellipse cx="152" cy="84" rx="7" ry="5" fill="#e8e7e1" stroke="#ccc" stroke-width="0.8"/>
    <ellipse cx="48" cy="26" rx="7" ry="5" fill="#e8e7e1" stroke="#ccc" stroke-width="0.8"/>
    <ellipse cx="48" cy="84" rx="7" ry="5" fill="#e8e7e1" stroke="#ccc" stroke-width="0.8"/>
    <text x="100" y="58" text-anchor="middle" font-size="7" fill="#aaa">TOP VIEW</text>
    <text x="159" y="58" text-anchor="middle" font-size="6" fill="#bbb">FRONT</text>
    <text x="38"  y="58" text-anchor="middle" font-size="6" fill="#bbb">REAR</text>
    ${points}
  </svg>`;
}

function brokerFee(mmr) {
  if (mmr <= 5000)  return 250;
  if (mmr <= 15000) return 350;
  if (mmr <= 30000) return 450;
  return 550;
}

if (!v) {
  document.getElementById('detail-card').innerHTML = '<div style="padding:40px;text-align:center;color:#999">Vehicle not found. <a href="index.html">Back to catalog</a></div>';
} else {
  const port = v.originPort || 'NJ';
  const isUAEBlocked = v.titleStatus !== 'clean';
  const fee = brokerFee(v.mmr);

  const priceRows = DESTINATIONS.map(d => {
    const r = calculateDelivery(d.key, port);
    if (d.key === 'JebelAli' && isUAEBlocked) {
      return `<div class="price-row">
        <div class="dest">${d.flag} ${d.label}</div>
        <div class="pvals"><div class="p-x">Not available</div><div class="p-xr">Title absent — RTA rejects</div></div>
      </div>`;
    }
    return `<div class="price-row">
      <div class="dest">${d.flag} ${d.label}</div>
      <div class="pvals">
        <div class="p-r">$${r.retail.toLocaleString()}</div>
        <div class="p-d">$${r.dealer.toLocaleString()} dealer</div>
      </div>
    </div>`;
  }).join('');

  const vinDisplay = `${v.vin.slice(0,6)}<span id="vin-hidden" style="filter:blur(3px);cursor:pointer" onclick="document.getElementById('vin-hidden').style.filter='none'">${v.vin.slice(6,-3)}</span>${v.vin.slice(-3)}`;

  document.getElementById('detail-card').innerHTML = `
    <div class="detail-header">
      <div>
        <div style="font-size:17px;font-weight:500;margin-bottom:3px">${v.year} ${v.make} ${v.model}</div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:7px">
          VIN: <span style="font-family:var(--mono)">${vinDisplay}</span> &nbsp;·&nbsp; ${v.mileage.toLocaleString()} mi &nbsp;·&nbsp; ${v.engine} &nbsp;·&nbsp; ${v.originPort} yard
        </div>
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          ${v.titleStatus === 'clean' ? '<span class="vb vb-ok">Clean title</span>' : `<span class="vb vb-warn">${v.titleStatus.charAt(0).toUpperCase()+v.titleStatus.slice(1)} title</span>`}
          <span class="vb ${v.grade < 3 ? 'vb-warn' : v.grade >= 4 ? 'vb-ok' : 'vb-neutral'}">Grade ${v.grade}</span>
          <span class="vb vb-neutral">${v.owners} owners · ${v.accidents} accident${v.accidents!==1?'s':''}</span>
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0;margin-left:14px">
        <div style="font-size:22px;font-weight:500">$${v.mmr.toLocaleString()}</div>
        <div style="font-size:11px;color:var(--text2)">Avg MMR</div>
      </div>
    </div>

    <div class="detail-body">
      <div class="dleft">
        <div class="sec-label">Damage diagram</div>
        <div class="dmg-legend">
          <div class="leg"><div class="ld ld-red"></div>Damage</div>
          <div class="leg"><div class="ld ld-yellow"></div>Prev. repair</div>
          <div class="leg"><div class="ld ld-green"></div>Clean</div>
          <div class="leg"><div class="ld ld-q" style="width:8px;height:8px;border-radius:50%;border:1.5px dashed #888"></div>Unknown</div>
        </div>
        ${buildDiagram(v.damage)}
        <div class="dmg-list">
          ${v.damage.map(d => `
            <div class="dmg">
              <div class="dot dot-${d.status === 'damage' ? 'red' : d.status === 'repair' ? 'yellow' : 'green'}"></div>
              ${d.zone.replace(/([A-Z])/g,' $1').replace(/^./,s=>s.toUpperCase())} — ${d.desc}
            </div>`).join('')}
        </div>
        ${v.interiorWarnings?.length ? `
          <div class="int-warn">
            <i class="ti ti-alert-triangle"></i>
            <span>${v.interiorWarnings.join(' · ')}</span>
          </div>` : ''}
      </div>

      <div class="dright">
        <div class="sec-label">All-in delivery price</div>
        ${priceRows}
        <div class="price-note">
          Pickup: ${v.originPort} yard → Port ${v.originPort}<br>
          Rates valid this week · Duty not included<br>
          Dealer rate: 3+ cars/month · FMC #022641
        </div>
      </div>
    </div>

    <div class="detail-footer">
      <a class="btn-wa-lg" href="https://wa.me/12127966646?text=Hi+ExportLots.+${v.year}+${v.make}+${v.model}+VIN+${v.vin}.+Destination%3A+___+Send+real+photos." target="_blank">
        <i class="ti ti-brand-whatsapp"></i> Get real photos
      </a>
      <button class="btn-secondary" onclick="alert('Broker assist fee: $${fee}. WhatsApp us to proceed.')">
        <i class="ti ti-calculator"></i> Broker assist $${fee}
      </button>
      <div class="detail-note">Stock photo for illustration<br>Real Manheim photos on WhatsApp</div>
    </div>`;
}
</script>
</body>
</html>
