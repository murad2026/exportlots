<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehicle Detail — ExportLots</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="style.css">
<style>
.dcard{background:var(--bg-elev);border:1px solid var(--line);border-radius:var(--radius-lg);overflow:hidden;max-width:860px;margin:0 auto}
.dhead{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
.dh-lot{font-size:10px;font-family:var(--mono);color:var(--ink-mute);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px}
.dh-title{font-size:22px;font-weight:600;color:var(--ink);letter-spacing:-0.4px;margin-bottom:4px}
.dh-sub{font-size:13px;color:var(--ink-soft);margin-bottom:10px}
.dh-timer{text-align:right;flex-shrink:0}
.dht-label{font-size:10px;color:var(--ink-mute);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px}
.dht-time{font-size:24px;font-weight:700;font-family:var(--mono);color:var(--accent);line-height:1.1}
.dht-sub{font-size:11px;color:var(--ink-mute);margin-top:3px}
.dflag-row{display:flex;align-items:center;gap:6px;padding:12px 24px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.dflag-label{font-size:11px;color:var(--ink-soft);font-family:var(--mono);margin-right:4px}
.dflag{font-size:20px;cursor:pointer;padding:4px 8px;border-radius:var(--radius);border:1px solid var(--line);background:var(--bg-elev);line-height:1.3;transition:all 0.12s}
.dflag:hover{border-color:var(--ink-soft)}
.dflag.active{border:2px solid var(--accent);background:var(--accent-s)}
.dflag-x{font-size:20px;padding:4px 8px;opacity:0.2;cursor:not-allowed}
.dbody{display:grid;grid-template-columns:1fr 1fr}
@media(max-width:640px){.dbody{grid-template-columns:1fr}}
.dleft{padding:18px 24px;border-right:1px solid var(--line)}
@media(max-width:640px){.dleft{border-right:none;border-bottom:1px solid var(--line)}}
.dright{padding:18px 24px}
.sec-label{font-size:10px;font-weight:500;color:var(--ink-mute);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px}
.spec-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.spec-item{display:flex;flex-direction:column;gap:2px}
.spec-key{font-size:10px;color:var(--ink-mute);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.06em}
.spec-val{font-size:13px;color:var(--ink);font-weight:500}
.dest-name{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.dest-flag{font-size:26px}
.dest-label{font-size:15px;font-weight:600;color:var(--ink)}
.dest-note{font-size:11px;color:var(--ink-soft);margin-bottom:14px}
.dest-total{font-size:28px;font-weight:700;color:var(--ink);letter-spacing:-0.6px;margin-bottom:14px}
.brow{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:0.5px solid var(--line)}
.brow:last-of-type{border-bottom:none}
.bl{color:var(--ink-soft)}.bv{color:var(--ink);font-family:var(--mono)}
.btotal{display:flex;justify-content:space-between;font-size:14px;font-weight:600;padding:8px 0 0;border-top:1px solid var(--ink-mute);margin-top:4px}
.duty{font-size:10px;color:var(--ink-mute);margin-top:10px;line-height:1.6;padding-top:8px;border-top:0.5px solid var(--line)}
.blocked-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;height:160px;gap:8px;text-align:center}
.blocked-flag{font-size:40px;opacity:0.2}
.blocked-text{font-size:12px;color:#dc2626;line-height:1.6}
.dfoot{padding:14px 24px;border-top:1px solid var(--line);display:flex;gap:10px;align-items:center}
.dwa{display:inline-flex;align-items:center;gap:8px;background:#25D366;color:#fff;font-size:13px;font-weight:500;padding:10px 20px;border-radius:50px;text-decoration:none;transition:background 0.15s}
.dwa:hover{background:#1ea952}
.dnote{font-size:10px;color:var(--ink-mute);margin-left:auto;text-align:right;line-height:1.6}
.announce-box{background:var(--accent-s);border:1px solid rgba(184,65,12,0.2);border-radius:var(--radius);padding:8px 12px;font-size:11px;color:#7c2d12;line-height:1.5;margin-top:12px}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-brand"><span class="dot"></span>ExportLots</a>
    <div class="nav-links" id="nav-links">
      <a href="/">Home</a>
      <a href="/shipping">Destinations</a>
      <a href="/how-it-works">How it works</a>
      <a href="/partners">Partners</a>
    </div>
    <div class="nav-cta" id="nav-cta">
      <a href="/login" class="nav-login">Dealer login</a>
      <a href="/join" class="btn btn-accent btn-sm">Apply for access</a>
    </div>
  </div>
</nav>

<div style="max-width:900px;margin:0 auto;padding:20px var(--gap)">
  <a id="back-link" href="/catalog" style="font-size:13px;color:var(--ink-soft);display:inline-flex;align-items:center;gap:5px;margin-bottom:16px;text-decoration:none">
    <i class="ti ti-arrow-left"></i> Back to catalog
  </a>
  <div class="dcard" id="dcard">
    <div style="padding:48px;text-align:center;color:var(--ink-soft)">Loading…</div>
  </div>
</div>

<a style="position:fixed;bottom:20px;right:20px;z-index:999;display:flex;align-items:center;gap:7px;background:#25D366;color:#fff;font-size:14px;font-weight:500;padding:12px 20px;border-radius:50px;box-shadow:0 4px 18px rgba(37,211,102,0.3);text-decoration:none" href="https://wa.me/12127965517" target="_blank">
  <i class="ti ti-brand-whatsapp" style="font-size:20px"></i> WhatsApp
</a>

<script src="rates.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const lot = params.get('lot');
const initialDest = params.get('dest') || 'Lagos';

async function initNav() {
  try {
    const s = await fetch('/api/session').then(r => r.json());
    if (s.ok && s.role === 'operator') {
      document.getElementById('nav-cta').innerHTML = `
        <a href="/admin/operator" class="btn btn-ghost btn-sm">← Operator panel</a>
        <button onclick="fetch('/api/auth/logout',{method:'POST'}).then(()=>location.href='/')" class="btn btn-ghost btn-sm">Sign out</button>`;
    } else if (s.ok && (s.role === 'dealer' || s.role === 'owner')) {
      document.getElementById('nav-cta').innerHTML = `
        <a href="/catalog" class="btn btn-ghost btn-sm">← Catalog</a>
        <button onclick="fetch('/api/auth/logout',{method:'POST'}).then(()=>location.href='/')" class="btn btn-ghost btn-sm">Sign out</button>`;
    }
  } catch {}
}

async function initDetail() {
  try {
    const res = await fetch('/api/vehicles');
    const data = await res.json();
    const vehicles = data.vehicles || data;
    const v = vehicles.find(x => x.lot === lot);
    renderDetail(v);
  } catch(e) {
    document.getElementById('dcard').innerHTML = '<div style="padding:48px;text-align:center">Failed to load. <a href="/">Back</a></div>';
  }
}

function renderDetail(v) {
  if (!v) {
    document.getElementById('dcard').innerHTML = '<div style="padding:48px;text-align:center">Vehicle not found. <a href="/">Back to catalog</a></div>';
    return;
  }

  // derive origin port from location
  const locState = (v.location || '').match(/^([A-Z]+)\s*-/)?.[1] || 'NJ';
  const port = locState;
  const lotPrice = v.buy_now || v.mmr_avg || 0;
  const isUAEBlocked = (v.title_status || '').toLowerCase() !== 'clean';
  const auctionEnd = v.sale_type === 'simulcast' ? v.start_time : v.end_time;

  function fmtTime(sec) {
    const d=Math.floor(sec/86400),h=Math.floor((sec%86400)/3600),m=Math.floor((sec%3600)/60),s=sec%60;
    if(d>0) return `${d}d ${h}h`;
    if(h>0) return `${h}h ${String(m).padStart(2,'0')}m`;
    return `${m}m ${String(s).padStart(2,'0')}s`;
  }

  function getTimerHtml() {
    if (!auctionEnd) return `<div class="dht-label">Status</div><div class="dht-time" style="font-size:14px">Available</div>`;
    const sec = Math.max(0, Math.floor((new Date(auctionEnd) - new Date()) / 1000));
    if (sec <= 0) return `<div class="dht-label">Status</div><div class="dht-time" style="font-size:14px;color:var(--ink-mute)">Ended</div>`;
    const label = v.sale_type === 'simulcast' ? 'Live auction starts in' : 'Auction ends in';
    return `<div class="dht-label">${label}</div><div class="dht-time" id="dcd">${fmtTime(sec)}</div>`;
  }

  function renderPricePanel(destKey) {
    if (destKey === 'JebelAli' && isUAEBlocked) {
      return `<div class="blocked-panel">
        <div class="blocked-flag">🇦🇪</div>
        <div class="blocked-text">Not available for this vehicle.<br>Dubai RTA requires clean title.<br>This vehicle: ${v.title_status || 'status unknown'}.</div>
      </div>`;
    }
    const d = DESTINATIONS.find(x => x.key === destKey) || DESTINATIONS[0];
    const r = calculateAllIn(lotPrice, d.key, port, false);
    const br = r.breakdown;
    return `
      <div class="dest-name"><span class="dest-flag">${d.flag}</span><span class="dest-label">${d.label}</span></div>
      <div class="dest-note">${d.note}</div>
      <div class="dest-total">$${r.total.toLocaleString()}</div>
      ${Object.entries(br).map(([k,val])=>`<div class="brow"><span class="bl">${k}</span><span class="bv">$${val.toLocaleString()}</span></div>`).join('')}
      <div class="btotal"><span>All-in CIF</span><span>$${r.total.toLocaleString()}</span></div>
      <div class="duty">Destination duty, VAT & clearing agent not included.<br>Paid locally at port by consignee.</div>
    `;
  }

  const flagsHtml = DESTINATIONS.map(d => {
    if (d.key === 'JebelAli' && isUAEBlocked) return `<span class="dflag-x" title="Clean title required">🇦🇪</span>`;
    return `<span class="dflag${d.key === initialDest ? ' active' : ''}" onclick="switchDest('${d.key}', this)" title="${d.label}">${d.flag}</span>`;
  }).join('');

  const titleStatus = v.title_status || 'Unknown';
  const titleCls = titleStatus.toLowerCase() === 'clean' ? '#16a34a' : titleStatus.toLowerCase().includes('salvage') ? '#dc2626' : 'var(--ink-soft)';

  const waText = encodeURIComponent(`Hi ExportLots. I'm interested in ${v.year} ${v.make} ${v.model}, Lot ${v.lot}. Please send real photos.`);

  document.getElementById('dcard').innerHTML = `
    <div class="dhead">
      <div>
        <div class="dh-lot">Lot ${v.lot}</div>
        <div class="dh-title">${v.year} ${v.make} ${v.model}${v.trim ? ' ' + v.trim : ''}</div>
        <div class="dh-sub">${(v.mileage||0).toLocaleString()} mi &nbsp;·&nbsp; ${v.drivetrain||''} &nbsp;·&nbsp; ${v.engine||''} &nbsp;·&nbsp; ${v.color_ext||''}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">
          <span class="vb" style="background:var(--bg);border:1px solid var(--line);padding:3px 8px;border-radius:4px;font-size:11px;font-family:var(--mono)">${v.sale_type === 'simulcast' ? 'LIVE AUCTION' : 'TIMED SALE'}</span>
          <span class="vb" style="background:var(--bg);border:1px solid ${titleCls};color:${titleCls};padding:3px 8px;border-radius:4px;font-size:11px;font-family:var(--mono)">${titleStatus}</span>
          ${v.grade ? `<span class="vb" style="background:var(--bg);border:1px solid var(--line);padding:3px 8px;border-radius:4px;font-size:11px;font-family:var(--mono)">Grade ${v.grade}</span>` : ''}
          ${v.autocheck ? `<span class="vb" style="background:var(--bg);border:1px solid var(--line);padding:3px 8px;border-radius:4px;font-size:11px;font-family:var(--mono)">AutoCheck ${v.autocheck}</span>` : ''}
        </div>
      </div>
      <div class="dh-timer">${getTimerHtml()}</div>
    </div>

    <div class="dflag-row">
      <span class="dflag-label">Destination:</span>
      ${flagsHtml}
    </div>

    <div class="dbody">
      <div class="dleft">
        <div class="sec-label">Vehicle specs</div>
        <div class="spec-grid">
          <div class="spec-item"><span class="spec-key">Body</span><span class="spec-val">${v.body||'—'}</span></div>
          <div class="spec-item"><span class="spec-key">Transmission</span><span class="spec-val">${v.transmission||'—'}</span></div>
          <div class="spec-item"><span class="spec-key">Fuel</span><span class="spec-val">${v.fuel||'—'}</span></div>
          <div class="spec-item"><span class="spec-key">Drivetrain</span><span class="spec-val">${v.drivetrain||'—'}</span></div>
          <div class="spec-item"><span class="spec-key">Ext. color</span><span class="spec-val">${v.color_ext||'—'}</span></div>
          <div class="spec-item"><span class="spec-key">Int. color</span><span class="spec-val">${v.color_int||'—'}</span></div>
          <div class="spec-item"><span class="spec-key">Owners</span><span class="spec-val">${v.owners != null ? v.owners : '—'}</span></div>
          <div class="spec-item"><span class="spec-key">Accidents</span><span class="spec-val">${v.accidents != null ? v.accidents : '—'}</span></div>
          <div class="spec-item"><span class="spec-key">MSRP</span><span class="spec-val">${v.msrp ? '$' + v.msrp.toLocaleString() : '—'}</span></div>
          <div class="spec-item"><span class="spec-key">Est. price</span><span class="spec-val">${v.mmr_avg ? '$' + v.mmr_avg.toLocaleString() : '—'}</span></div>
        </div>
        <div style="margin-top:14px">
          <div class="sec-label">Location</div>
          <div style="font-size:13px;color:var(--ink)">${v.location||'—'}</div>
        </div>
        ${v.announcements ? `<div class="announce-box"><strong>Announcements:</strong> ${v.announcements}</div>` : ''}
        ${v.remarks ? `<div class="announce-box" style="margin-top:6px">${v.remarks}</div>` : ''}
        <div style="margin-top:16px">
          <div class="sec-label">VIN</div>
          <div style="font-size:13px;font-family:var(--mono);color:var(--ink)">${v.vin_masked} <span style="font-size:11px;color:var(--ink-mute)">(full VIN on WhatsApp)</span></div>
        </div>
      </div>
      <div class="dright" id="price-panel">
        ${renderPricePanel(initialDest)}
      </div>
    </div>

    <div class="dfoot">
      <a class="dwa" href="https://wa.me/12127965517?text=${waText}" target="_blank">
        <i class="ti ti-brand-whatsapp" style="font-size:18px"></i>
        Get real photos + full VIN
      </a>
      <div class="dnote">Stock photo shown · Real photos on WhatsApp<br>Rates valid this week · FMC NVOCC #022641</div>
    </div>
  `;

  window.switchDest = function(key, el) {
    document.querySelectorAll('.dflag').forEach(f => f.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('price-panel').innerHTML = renderPricePanel(key);
  };

  if (auctionEnd) {
    setInterval(() => {
      const el = document.getElementById('dcd');
      if (!el) return;
      const sec = Math.max(0, Math.floor((new Date(auctionEnd) - new Date()) / 1000));
      el.textContent = sec > 0 ? fmtTime(sec) : 'Ended';
    }, 1000);
  }
}

initNav();
initDetail();
</script>
</body>
</html>
