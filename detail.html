<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehicle Detail — ExportLots</title>
<link rel="stylesheet" href="style.css">
<style>
.dcard{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;max-width:860px;margin:0 auto}
.dhead{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
.dh-price{font-size:26px;font-weight:700;color:var(--text);letter-spacing:-0.8px;margin-bottom:3px}
.dh-name{font-size:15px;font-weight:500;color:var(--text);margin-bottom:2px}
.dh-sub{font-size:12px;color:var(--text2);margin-bottom:7px}
.dh-timer{text-align:right;flex-shrink:0;margin-left:14px}
.dht-label{font-size:10px;color:var(--text3);margin-bottom:2px}
.dht-time{font-size:22px;font-weight:700;font-family:var(--mono);color:#c2410c;line-height:1.2}
.dht-sub{font-size:10px;color:#c2410c;margin-top:2px}
.dflag-row{display:flex;align-items:center;gap:6px;padding:10px 18px;border-bottom:1px solid var(--border)}
.dflag-label{font-size:11px;color:var(--text2);margin-right:2px}
.dflag{font-size:22px;cursor:pointer;padding:4px 7px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--bg2);line-height:1.2;transition:all 0.1s}
.dflag:hover{border-color:var(--border2)}
.dflag.active{border:2px solid var(--text);background:var(--bg)}
.dflag-x{font-size:22px;padding:4px 7px;opacity:0.2}
.dbody{display:grid;grid-template-columns:1fr 1fr}
.dleft{padding:14px 18px;border-right:1px solid var(--border)}
.dright{padding:14px 18px}
.sec-label{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px}
.dmg-legend{display:flex;gap:10px;margin-bottom:8px}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2)}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dmg-list{display:flex;flex-direction:column;gap:4px;margin-top:8px}
.dmg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-red{background:#E24B4A}.dot-yellow{background:#EF9F27}.dot-green{background:#3B6D11}
.int-warn{background:var(--color-background-warning,#fef3c7);border-radius:var(--radius);padding:7px 10px;margin-top:8px;font-size:11px;color:#92400e;line-height:1.5}
.dest-name{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.dest-flag{font-size:26px}
.dest-label{font-size:14px;font-weight:500;color:var(--text)}
.dest-total{font-size:26px;font-weight:700;color:var(--text);letter-spacing:-0.5px;margin-bottom:12px}
.brow{display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:0.5px solid var(--border)}
.brow:last-of-type{border-bottom:none}
.bl{color:var(--text2)}.bv{color:var(--text);font-family:var(--mono)}
.btotal{display:flex;justify-content:space-between;font-size:13px;font-weight:500;padding:7px 0 0;border-top:1px solid var(--border2);margin-top:4px}
.duty{font-size:10px;color:var(--text3);margin-top:10px;line-height:1.6;padding-top:8px;border-top:0.5px solid var(--border)}
.blocked-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;height:180px;gap:8px;text-align:center}
.blocked-flag{font-size:40px;opacity:0.2}
.blocked-text{font-size:12px;color:var(--red);line-height:1.6}
.dfoot{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center}
.dwa{display:inline-flex;align-items:center;gap:8px;background:#25D366;color:#fff;font-size:13px;font-weight:500;padding:9px 18px;border-radius:50px;border:none;cursor:pointer;text-decoration:none}
.dwa:hover{background:#1ea952}
.dwa-icon{width:22px;height:22px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dwa-icon i{font-size:14px;color:#25D366}
.dnote{font-size:10px;color:var(--text3);margin-left:auto;text-align:right;line-height:1.6}
</style>
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-logo">Export<span>Lots</span></a>
  <div class="nav-links">
    <a href="index.html">Catalog</a>
    <a href="shipping.html">Shipping</a>
    <a href="how-it-works.html">How it works</a>
    <a href="wholesale.html">Wholesale</a>
    <a href="partners.html">Partners</a>
  </div>
  <a class="nav-wa" href="https://wa.me/12127965517" target="_blank">
    <i class="ti ti-brand-whatsapp"></i> WhatsApp
  </a>
</nav>

<div style="max-width:900px;margin:0 auto;padding:16px 20px">
  <a href="index.html" style="font-size:13px;color:var(--text2);display:inline-flex;align-items:center;gap:5px;margin-bottom:14px">
    <i class="ti ti-arrow-left"></i> Back to catalog
  </a>
  <div class="dcard" id="dcard"><div style="padding:40px;text-align:center;color:var(--text2)">Loading...</div></div>
</div>

<a style="position:fixed;bottom:20px;right:20px;z-index:999;display:flex;align-items:center;gap:7px;background:#25D366;color:#fff;font-size:14px;font-weight:500;padding:12px 20px;border-radius:50px;box-shadow:0 4px 18px rgba(37,211,102,0.3);text-decoration:none" href="https://wa.me/12127965517" target="_blank">
  <i class="ti ti-brand-whatsapp" style="font-size:20px"></i> WhatsApp
</a>

<script src="rates.js"></script>
<script src="vehicles.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const vin = params.get('vin');
const initialDest = params.get('dest') || 'Lagos';
const v = VEHICLES.find(x => x.vin === vin);

if (!v) {
  document.getElementById('dcard').innerHTML = '<div style="padding:40px;text-align:center">Vehicle not found. <a href="index.html">Back</a></div>';
} else {
  const port = v.originPort || 'NJ';
  const lotPrice = v.buyNow || v.mmr || 0;
  const isUAEBlocked = v.titleStatus !== 'clean';
  const expiryDate = v.expiryDate || v.auctionDate;

  function fmtTime(sec) {
    const d=Math.floor(sec/86400),h=Math.floor((sec%86400)/3600),m=Math.floor((sec%3600)/60),s=sec%60;
    if(d>0) return `${d}d ${h}h`;
    if(h>0) return `${h}h ${String(m).padStart(2,'0')}m`;
    return `${m}m ${String(s).padStart(2,'0')}s`;
  }

  function getTimerHtml() {
    if (!expiryDate) return '<div class="dht-label">Status</div><div class="dht-time" style="font-size:14px;color:var(--text2)">Buy Now</div>';
    const sec = Math.max(0, Math.floor((new Date(expiryDate) - new Date()) / 1000));
    if (sec <= 0) return '<div class="dht-label">Status</div><div class="dht-time" style="font-size:14px;color:var(--text3)">Sold</div>';
    return `<div class="dht-label">Auction ends in</div><div class="dht-time" id="dcd">${fmtTime(sec)}</div><div class="dht-sub">${v.auctionType === 'buynow' ? 'Buy Now' : 'Timed sale'}</div>`;
  }

  function buildDiagram(damage) {
    const COORDS = {windshield:{x:162,y:55},frontBumper:{x:178,y:55},hood:{x:153,y:46},leftFrontDoor:{x:95,y:22},leftFender:{x:133,y:22},leftRearDoor:{x:72,y:22},rightFrontDoor:{x:95,y:88},rightRearDoor:{x:72,y:88},rightFender:{x:133,y:88},rearBumper:{x:22,y:55},roof:{x:110,y:55}};
    const COLORS = {damage:'#E24B4A',repair:'#EF9F27',clean:'#3B6D11',unknown:'#888'};
    const pts = (damage||[]).map(d => { const c=COORDS[d.zone]; if(!c) return ''; return `<circle cx="${c.x}" cy="${c.y}" r="5" fill="${COLORS[d.status]||'#888'}" opacity="0.9"/>`; }).join('');
    return `<svg viewBox="0 0 200 110" width="100%">
      <rect x="18" y="28" width="164" height="54" rx="10" fill="none" stroke="var(--border2)" stroke-width="1.2"/>
      <rect x="140" y="30" width="38" height="50" rx="8" fill="var(--bg2)" stroke="var(--border)" stroke-width="0.8"/>
      <rect x="22" y="30" width="32" height="50" rx="8" fill="var(--bg2)" stroke="var(--border)" stroke-width="0.8"/>
      <rect x="62" y="32" width="72" height="46" rx="4" fill="var(--bg2)" stroke="var(--border)" stroke-width="0.8"/>
      <ellipse cx="152" cy="26" rx="7" ry="5" fill="var(--bg2)" stroke="var(--border)" stroke-width="0.8"/>
      <ellipse cx="152" cy="84" rx="7" ry="5" fill="var(--bg2)" stroke="var(--border)" stroke-width="0.8"/>
      <ellipse cx="48" cy="26" rx="7" ry="5" fill="var(--bg2)" stroke="var(--border)" stroke-width="0.8"/>
      <ellipse cx="48" cy="84" rx="7" ry="5" fill="var(--bg2)" stroke="var(--border)" stroke-width="0.8"/>
      <text x="159" y="58" text-anchor="middle" font-size="6" fill="var(--text3)">FRONT</text>
      <text x="38" y="58" text-anchor="middle" font-size="6" fill="var(--text3)">REAR</text>
      ${pts}
    </svg>`;
  }

  function renderPricePanel(destKey) {
    if (destKey === 'JebelAli' && isUAEBlocked) {
      return `<div class="blocked-panel"><div class="blocked-flag">🇦🇪</div><div class="blocked-text">Not available for this vehicle.<br>Dubai RTA requires clean title.<br>This vehicle's title status: ${v.titleStatus}.</div></div>`;
    }
    const d = DESTINATIONS.find(x => x.key === destKey) || DESTINATIONS[0];
    const r = calculateAllIn(lotPrice, d.key, port, false);
    const br = r.breakdown;
    return `
      <div class="dest-name"><span class="dest-flag">${d.flag}</span><span class="dest-label">${d.label}</span></div>
      <div class="dest-total">$${r.total.toLocaleString()}</div>
      ${Object.entries(br).map(([k,val])=>`<div class="brow"><span class="bl">${k}</span><span class="bv">$${val.toLocaleString()}</span></div>`).join('')}
      <div class="btotal"><span>Total all-in</span><span>$${r.total.toLocaleString()}</span></div>
      <div class="duty">Duty + clearing agent fees not included<br>Paid locally at destination port</div>
    `;
  }

  const titleClass = v.titleStatus === 'clean' ? 'vb-ok' : v.titleStatus === 'salvage' ? 'vb-warn' : 'vb-neutral';
  const titleText = v.titleStatus === 'clean' ? 'Clean title' : v.titleStatus === 'absent' ? 'Title absent' : v.titleStatus === 'salvage' ? 'Salvage' : '? Title unknown';
  const gradeClass = !v.grade ? 'vb-neutral' : v.grade < 3 ? 'vb-warn' : v.grade >= 4 ? 'vb-ok' : 'vb-neutral';
  const gradeText = v.grade ? `Grade ${v.grade}` : 'No CR';
  const vinDisplay = `${v.vin.slice(0,11)}<span style="filter:blur(3px);cursor:pointer" onclick="this.style.filter='none'">${v.vin.slice(11)}</span>`;

  const flagsHtml = DESTINATIONS.map(d => {
    if (d.key === 'JebelAli' && isUAEBlocked) return `<span class="dflag-x" title="Clean title required">🇦🇪</span>`;
    return `<span class="dflag${d.key === initialDest ? ' active' : ''}" onclick="switchDest('${d.key}', this)" title="${d.label}">${d.flag}</span>`;
  }).join('');

  document.getElementById('dcard').innerHTML = `
    <div class="dhead">
      <div>
        <div class="dh-price">$${lotPrice.toLocaleString()}</div>
        <div class="dh-name">${v.year} ${v.make} ${v.model}</div>
        <div class="dh-sub">VIN: <span style="font-family:var(--mono)">${vinDisplay}</span> &nbsp;·&nbsp; ${v.mileage.toLocaleString()} mi &nbsp;·&nbsp; ${v.engine} &nbsp;·&nbsp; ${v.originPort} yard</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          <span class="vb ${titleClass}">${titleText}</span>
          <span class="vb ${gradeClass}">${gradeText}</span>
          <span class="vb vb-neutral">${v.owners} owner${v.owners!==1?'s':''} · ${v.accidents} acc.</span>
        </div>
      </div>
      <div class="dh-timer">${getTimerHtml()}</div>
    </div>

    <div class="dflag-row">
      <span class="dflag-label">Destination:</span>
      ${flagsHtml}
    </div>

    <div class="dbody">
      <div class="dleft">
        <div class="sec-label">Damage map</div>
        <div class="dmg-legend">
          <div class="leg"><div class="ld" style="background:#E24B4A"></div>Damage</div>
          <div class="leg"><div class="ld" style="background:#EF9F27"></div>Prev. repair</div>
          <div class="leg"><div class="ld" style="background:#3B6D11"></div>Clean</div>
        </div>
        ${buildDiagram(v.damage)}
        <div class="dmg-list">
          ${(v.damage||[]).map(d=>`<div class="dmg"><div class="dot dot-${d.status==='damage'?'red':d.status==='repair'?'yellow':'green'}"></div>${d.zone.replace(/([A-Z])/g,' $1').replace(/^./,s=>s.toUpperCase())} — ${d.desc}</div>`).join('')}
        </div>
        ${(v.interiorWarnings||[]).length ? `<div class="int-warn">${v.interiorWarnings.join(' · ')}</div>` : ''}
      </div>
      <div class="dright" id="price-panel">
        ${renderPricePanel(initialDest)}
      </div>
    </div>

    <div class="dfoot">
      <a class="dwa" href="https://wa.me/12127965517?text=Hi+ExportLots.+${v.year}+${v.make}+${v.model}+VIN+${v.vin.slice(0,9)}******.+Destination%3A+___+Send+real+photos." target="_blank">
        <div class="dwa-icon"><i class="ti ti-brand-whatsapp"></i></div>
        Get real photos
      </a>
      <div class="dnote">Stock photo · Real photos on WhatsApp<br>Rates valid this week · FMC #022641</div>
    </div>
  `;

  window.switchDest = function(key, el) {
    document.querySelectorAll('.dflag').forEach(f=>f.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('price-panel').innerHTML = renderPricePanel(key);
  };

  if (expiryDate) {
    setInterval(() => {
      const el = document.getElementById('dcd');
      if (!el) return;
      const sec = Math.max(0, Math.floor((new Date(expiryDate) - new Date()) / 1000));
      el.textContent = sec > 0 ? fmtTime(sec) : 'Sold';
    }, 1000);
  }
}
</script>
</body>
</html>
