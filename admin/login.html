<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — ExportLots</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="auth-wrap">
  <div style="width:100%;max-width:400px">
    <div style="text-align:center;margin-bottom:28px">
      <a href="/" style="font-family:var(--serif);font-size:20px;font-weight:400;color:var(--ink)">ExportLots</a>
      <div style="font-size:12px;color:var(--ink-mute);font-family:var(--mono);margin-top:4px;letter-spacing:0.08em;text-transform:uppercase">Admin access</div>
    </div>
    <div class="auth-card">
      <h1 style="font-size:24px;margin-bottom:4px">Admin login</h1>
      <p class="subtitle">Owner or operator access</p>
      <form id="form">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" class="form-input" id="email" placeholder="admin" required autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="password" placeholder="••••••••" required>
        </div>
        <div class="form-group">
          <label class="form-label">Role</label>
          <select class="form-select" id="role">
            <option value="owner">Owner</option>
            <option value="operator">Operator</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px" id="btn">Sign in →</button>
        <div class="form-error" id="err"></div>
      </form>
    </div>
    <div style="text-align:center;margin-top:16px;font-size:12px;color:var(--ink-mute)">
      <a href="/login">Dealer login</a>
    </div>
  </div>
</div>
<script>
document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  err.style.display = 'none';
  btn.textContent = 'Signing in...'; btn.disabled = true;
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value, role: document.getElementById('role').value })
    });
    const d = await res.json();
    if (d.ok) {
      window.location.href = d.role === 'operator' ? '/admin/operator' : '/admin';
    } else {
      err.textContent = d.message || 'Invalid credentials.';
      err.style.display = 'block';
      btn.textContent = 'Sign in →'; btn.disabled = false;
    }
  } catch {
    err.textContent = 'Network error.';
    err.style.display = 'block';
    btn.textContent = 'Sign in →'; btn.disabled = false;
  }
});
</script>
</body>
</html>
